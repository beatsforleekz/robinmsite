<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robin M</title>
  <meta name="description" content="Robin Michelangelo aka Robin M, London based producer / DJ and founder of Ulu Records." />
  <style>
    :root {
      --bg: #000000;
      --panel: #000000;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.88);
      --line: rgba(255, 255, 255, 0.2);
      --line-soft: rgba(255, 255, 255, 0.12);
      --header-height: 93px;
      --content-width: 946px;
      --hero-width: 400px;
      --hero-ratio: 0.7197553517;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .page {
      width: 100%;
      background: var(--bg);
    }

    .shell {
      width: min(100%, calc(var(--content-width) + 32px));
      margin: 0 auto;
      padding: 0 16px;
    }

    .header {
      min-height: var(--header-height);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      padding: 10px 0 14px;
    }

    .brand {
      display: inline-flex;
      align-items: flex-end;
      min-width: 0;
    }

    .brand-mark {
      width: clamp(122px, 16vw, 250px);
      height: auto;
      object-fit: contain;
      filter: invert(1);
    }

    .socials {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      padding-bottom: 3px;
    }

    .social {
      width: 35px;
      height: 35px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      opacity: 0.96;
      transition: opacity 0.18s ease, transform 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .social:hover,
    .social:focus-visible {
      opacity: 0.68;
      transform: translateY(-1px);
    }

    .social svg,
    .social img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .social svg {
      fill: currentColor;
    }

    .social img {
      object-fit: contain;
    }

    .social-ulu {
      width: 36px;
      height: 36px;
    }

    .social-bp {
      width: 39px;
      height: 45px;
    }

    .hero-wrap {
      width: min(100%, var(--hero-width));
      margin: 24px auto 0;
      position: relative;
      background: var(--panel);
    }

    .hero-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .hero {
      position: relative;
      width: 100%;
      aspect-ratio: 940 / 1306;
      min-height: 0;
      background: #000000;
      overflow: hidden;
      -webkit-mask-image: radial-gradient(ellipse at center, rgba(0, 0, 0, 1) 60%, rgba(0, 0, 0, 0.94) 74%, rgba(0, 0, 0, 0.42) 88%, rgba(0, 0, 0, 0) 100%);
      mask-image: radial-gradient(ellipse at center, rgba(0, 0, 0, 1) 60%, rgba(0, 0, 0, 0.94) 74%, rgba(0, 0, 0, 0.42) 88%, rgba(0, 0, 0, 0) 100%);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, rgba(0, 0, 0, 0) 54%, rgba(0, 0, 0, 0.08) 72%, rgba(0, 0, 0, 0.2) 86%, rgba(0, 0, 0, 0.34) 100%);
      pointer-events: none;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: -1px;
      box-shadow: inset 0 0 42px rgba(0, 0, 0, 0.18);
      pointer-events: none;
      z-index: 1;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: saturate(0.98) brightness(0.96);
    }

    .signup {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 81px;
      min-height: 41px;
      padding: 0 16px;
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(0, 0, 0, 0.32);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
      transition: background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease;
      white-space: nowrap;
      touch-action: manipulation;
    }

    .signup:hover,
    .signup:focus-visible {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.48);
      color: #ffffff;
    }

    .footer {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 0 13px;
      border-top: 1px solid transparent;
    }

    .footer p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
      text-align: center;
    }

    @media (max-width: 980px) {
      .shell {
        width: 100%;
      }

      .header {
        align-items: center;
        padding-top: 14px;
        padding-bottom: 14px;
      }

      .brand-mark {
        width: clamp(116px, 18vw, 210px);
      }
    }

    @media (max-width: 700px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
      }

      .socials {
        width: 100%;
        justify-content: flex-start;
        gap: 8px;
      }

      .hero-wrap {
        width: min(100%, 340px);
        margin-top: 18px;
      }
    }

    @media (max-width: 480px) {
      .shell {
        padding: 0 10px;
      }

      .header {
        min-height: auto;
        padding-top: 12px;
        padding-bottom: 12px;
      }

      .brand-mark {
        width: 112px;
      }

      .social {
        width: 31px;
        height: 31px;
      }

      .social-ulu {
        width: 32px;
        height: 32px;
      }

      .social-bp {
        width: 34px;
        height: 38px;
      }

      .hero-wrap {
        width: min(100%, 280px);
      }

      .signup {
        min-width: 92px;
        min-height: 42px;
        padding: 0 14px;
        font-size: 11px;
      }

      .footer p {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

</body>
</html>
