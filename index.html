<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robin M</title>
  <meta name="description" content="Robin Michelangelo aka Robin M, London based producer / DJ and founder of Ulu Records." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600&family=Barlow:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --light: #e6e6e6;
      --grey: #b9b9b9;
      --mid: #8a8a8a;
      --border: rgba(255, 255, 255, 0.16);
      --f-head: 'Barlow Condensed', sans-serif;
      --f-body: 'Barlow', sans-serif;
      --gutter: clamp(1.25rem, 4vw, 3.75rem);
      --max: 1400px;
    }

    html {
      font-size: 16px;
      background: #000;
    }

    body {
      min-height: 100vh;
      background: #000;
      color: var(--white);
      font-family: var(--f-body);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .landing {
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      isolation: isolate;
      background: #000;
    }

    .landing::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.58) 0%, rgba(0,0,0,.38) 28%, rgba(0,0,0,.52) 65%, rgba(0,0,0,.74) 100%),
        radial-gradient(circle at 50% 40%, rgba(0,0,0,.04) 0%, rgba(0,0,0,.45) 72%, rgba(0,0,0,.76) 100%),
        url('images/RobinM-AmorosoFilms021.JPG') 50% 30% / cover no-repeat;
      z-index: -2;
      transform: scale(1.02);
    }

    .landing::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(0,0,0,.42) 0%, rgba(0,0,0,.08) 46%, rgba(0,0,0,.34) 100%);
      z-index: -1;
      pointer-events: none;
    }

    .shell {
      width: 100%;
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 var(--gutter);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      width: 100%;
      padding: clamp(1.15rem, 3vh, 1.85rem) 0;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 1rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      width: clamp(146px, 18vw, 264px);
      flex-shrink: 0;
    }

    .brand img {
      width: 100%;
      height: auto;
      object-fit: contain;
      filter: invert(1);
    }

    .top-actions {
      display: none;
    }

    .signup-link {
      font-family: var(--f-head);
      font-size: .82rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--white);
      border-bottom: 1px solid var(--border);
      padding-bottom: .35rem;
      transition: color .2s ease, border-color .2s ease;
      white-space: nowrap;
    }

    .signup-link:hover,
    .signup-link:focus-visible {
      color: var(--grey);
      border-color: rgba(255,255,255,.42);
    }

    .socials {
      display: flex;
      align-items: center;
      gap: clamp(.8rem, 1.4vw, 1.2rem);
      list-style: none;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .socials a {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      opacity: .82;
      transition: opacity .2s ease, transform .2s ease;
    }

    .socials a:hover,
    .socials a:focus-visible {
      opacity: 1;
      transform: translateY(-1px);
    }

    .socials svg,
    .socials img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .socials svg {
      fill: currentColor;
    }

    .socials img {
      object-fit: contain;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: clamp(3rem, 8vh, 6rem) 0 clamp(9rem, 22vh, 12rem);
    }

    .hero-card {
      width: min(100%, 540px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    .hero-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 3;
      width: 100%;
    }

    .hero-nav {display:none}

    .hero-signup {
      font-family: var(--f-head);
      font-size: 1.02rem;
      font-weight: 500;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: var(--white);
      border-bottom: 1px solid var(--border);
      padding-bottom: .45rem;
      transition: color .2s ease, border-color .2s ease;
    }

    .hero-signup:hover,
    .hero-signup:focus-visible {
      color: var(--grey);
      border-color: rgba(255,255,255,.44);
    }

    .hero-socials a {
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      opacity: .86;
      transition: opacity .2s ease, transform .2s ease;
      position: relative;
      z-index: 3;
    }

    .hero-socials a:hover,
    .hero-socials a:focus-visible {
      opacity: 1;
      transform: translateY(-1px);
    }

    .hero-socials svg,
    .hero-socials img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero-socials svg {
      fill: currentColor;
    }

    .hero-socials img {
      object-fit: contain;
    }

    .hero-socials .hero-ulu-link {
      width: 28px;
      height: 28px;
    }

    .hero-socials .hero-ulu-link img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(0) invert(1);
      opacity: 1;
    }

    .footer {
      width: 100%;
      padding: clamp(1.15rem, 2.8vh, 1.8rem) 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1.5rem;
    }

    .footer-left{
      justify-self:start;
    }

    .footer-center{
      justify-self:center;
    }

    .footer-right{
      justify-self:end;
    }

    .footer-copy {
      font-family: var(--f-head);
      font-size: .68rem;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--grey);
      text-align: left;
      line-height: 1;
    }

    .footer-signup{
      position:static;
      transform:none;
      z-index:4;
      line-height:1;
      flex-shrink:0;
    }

    .footer-socials{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:clamp(1rem,1.6vw,1.35rem);
      list-style:none;
      flex-wrap:nowrap;
      flex-shrink:0;
    }

    @media (max-width: 900px) {
      .landing::before {
        background:
          linear-gradient(180deg, rgba(0,0,0,.62) 0%, rgba(0,0,0,.42) 28%, rgba(0,0,0,.56) 68%, rgba(0,0,0,.8) 100%),
          radial-gradient(circle at 50% 34%, rgba(0,0,0,.04) 0%, rgba(0,0,0,.5) 72%, rgba(0,0,0,.82) 100%),
          url('images/RobinM-AmorosoFilms021.JPG') 50% 30% / cover no-repeat;
      }

      .topbar {
        align-items: flex-start;
      }

      .brand {
        width: clamp(140px, 26vw, 214px);
      }

      .hero {
        align-items: flex-end;
        padding-bottom: clamp(8rem, 19vh, 10rem);
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding: 0 clamp(1rem, 5vw, 1.35rem);
      }

      .topbar {
        align-items: flex-start;
        justify-content: flex-start;
        gap: .75rem;
      }

      .hero {
        justify-content: center;
        padding: clamp(2rem, 8vh, 4rem) 0 clamp(8rem, 18vh, 9rem);
      }

      .hero-card {
        width: 100%;
        gap: 0;
      }

      .hero-signup {
        font-size: .92rem;
      }

      .footer-socials a {
        width: 24px;
        height: 24px;
      }

      .footer-socials .hero-ulu-link {
        width: 26px;
        height: 26px;
      }

      .footer {
        padding: 1rem 0 1.2rem;
        gap: 1rem;
      }

      .footer-copy {
        font-size: .62rem;
        letter-spacing: .2em;
      }

      .footer-socials{
        gap:.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="landing">
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Robin M home">
          <img src="images/Robin_M.png" alt="Robin M" />
        </a>
      </header>

      <main class="hero" aria-label="Robin M landing page">
        <div class="hero-card">
          <div class="hero-meta"></div>
        </div>
      </main>

      <footer class="footer">
        <div class="footer-left">
          <p class="footer-copy">Copyright © All Rights Reserved Robin M</p>

  </div>
</body>
</html>
